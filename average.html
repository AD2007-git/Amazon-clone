<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Average </title>
</head>
<body>
    <script > 
    let marks = [];
    let sum = 0;

    for (let i = 0; i < 5; i++) {
    marks[i] = Number(prompt("Enter marks of subject " + (i+1)));
    sum = sum + marks[i];
}

let average = sum / 5;

console.log("Average Marks = " + average);
</script>
</body>
</html>
