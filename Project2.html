<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Amazon Clone</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: #e3e6e6; }

    
    .navbar {
      background: #131921;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .logo { font-size: 28px; font-weight: bold; color: #ff9900; }
    .search-bar { display: flex; flex: 1; max-width: 600px; }
    .search-bar input { width: 100%; padding: 10px; border: none; outline: none; font-size: 15px; }
    .search-bar button { background: #febd69; border: none; padding: 10px 16px; cursor: pointer; font-weight: bold; }
    .nav-links { color: white; font-size: 14px; cursor: pointer; }
    .cart-btn { color: white; font-size: 14px; cursor: pointer; }

   
    .subnav {
      background: #232f3e;
      padding: 10px 20px;
      display: flex;
      gap: 20px;
      overflow-x: auto;
    }
    .subnav a { color: white; text-decoration: none; font-size: 14px; white-space: nowrap; }
    .subnav a:hover { text-decoration: underline; }

    .hero {
      background: linear-gradient(to right, #f7f7f7, #dfe6e9);
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .hero h1 { font-size: 42px; color: #111; margin-bottom: 10px; }
    .hero p { font-size: 24px; color: #333; }

   
    .products {
      width: 95%;
      margin: -60px auto 30px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }
    .card {
      background: white;
      padding: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.15);
    }
    .card:hover { transform: translateY(-5px); box-shadow: 0 6px 14px rgba(0,0,0,0.2); transition: 0.3s; }
    .card h3 { font-size: 18px; margin-bottom: 12px; color: #111; }
    .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .item { text-align: center; }
    .item img { width: 100%; height: 100px; object-fit: cover; border-radius: 4px; }
    .item p { margin-top: 6px; font-size: 13px; color: #333; }
    .see-more { display: inline-block; margin-top: 12px; color: #007185; font-size: 14px; text-decoration: none; }

    
    .footer { background: #131921; color: white; text-align: center; padding: 18px; margin-top: 30px; }
  </style>
</head>

    </div>
    <div class="nav-links">Hello, sign in</div>

      cardDiv.appendChild(h3);

      
      var grid = document.createElement("div");
      grid.className = "card-grid";

      for (var j = 0; j < card.items.length; j++) {
        var item = card.items[j];

        var itemDiv = document.createElement("div");

        img.alt = item.name;

        itemDiv.appendChild(p);
        grid.appendChild(itemDiv);
      }

      cardDiv.appendChild(grid);

    function searchItem() {
